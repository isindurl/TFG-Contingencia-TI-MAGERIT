<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso — MAGERIT v3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Calibri, sans-serif; background: #1C2B4A; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-box { background: #fff; border-radius: 10px; padding: 40px; width: 360px; }
    h2 { color: #1C2B4A; margin-bottom: 8px; font-size: 22px; }
    p  { color: #888; font-size: 13px; margin-bottom: 24px; }
    label { font-size: 13px; font-weight: bold; color: #555; display: block; margin-top: 14px; }
    input { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; margin-top: 4px; }
    .btn { width: 100%; padding: 10px; background: #1C2B4A; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; margin-top: 20px; }
    .btn:hover { background: #2C5F8A; }
    .flash { padding: 10px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; background: #fde8e8; color: #A32D2D; }
  </style>
</head>
<body>
<div class="login-box">
  <h2>MAGERIT v3</h2>
  <p>Herramienta de análisis de riesgos TI — TFG UNIR</p>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for message in messages %}
        <div class="flash">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  <form method="POST">
    <label>Usuario</label>
    <input type="text" name="username" required autofocus>
    <label>Contraseña</label>
    <input type="password" name="password" required>
    <button type="submit" class="btn">Acceder</button>
  </form>
</div>
</body>
</html>
